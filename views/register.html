<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Bootstrap 5-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Register</title>
</head>
<body>
    <form id="register-form">
        <label for="name">Nome:</label>
        <input type="text" name="name" placeholder="digite seu Nome">
        <label for="email">Email:</label>
        <input type="email" name="email" placeholder="digite seu E-mail">
        <label for="password">Senha:</label>
        <input type="password" name="password" placeholder="crie sua Senha">
        <label for="pass-verify">Digite a senha novamente:</label>
        <input type="password" name="pass-verify" placeholder="insira a mesma senha">

        <button type="submit">Enviar</button>
    </form>
    <span class="" id="ajax-message"></span>

</body>

<!--API para o ajax-->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!--Ajax-->
<script src="../assets/JS/Ajax.js"></script>
<!--bootstrap-->

</html>
